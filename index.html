<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Flecheiro | Autenticidade</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --ouro: #c5a059; --verde-profundo: #04120b; --verde-selo: #0a2b1a; --branco-creme: #f4f1ea; }
        body { background-color: var(--verde-profundo); color: var(--branco-creme); font-family: 'Montserrat', sans-serif; }
        .main-wrapper { max-width: 900px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        header h1 { font-family: 'Cinzel', serif; color: var(--ouro); letter-spacing: 0.2em; font-size: 3rem; margin-bottom: 10px; }
        .card-validacao { background: rgba(0,0,0,0.6); border: 1px solid rgba(197,160,89,0.3); padding: 40px; border-radius: 4px; backdrop-filter: blur(10px); }
        #resultado { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; }
        .selo-circular { width: 90%; max-width: 450px; background: var(--verde-selo); border: 8px double var(--ouro); border-radius: 50%; padding: 40px; color: var(--branco-creme); text-align: center; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(197,160,89,0.2); border-top-color: var(--ouro); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-voltar { margin-top: 20px; background: transparent; border: 1px solid var(--ouro); color: var(--ouro); padding: 10px 20px; cursor: pointer; font-family: 'Cinzel'; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <h1>Flecheiro</h1>
        <p style="font-family: 'Cinzel'; color: var(--ouro); letter-spacing: 3px;">A PUREZA DO FUNDAMENTO</p>
    </header>

    <div class="card-validacao" style="margin-top: 50px;">
        <div class="loader" id="loader" style="display:none;"></div>
        <p id="status-text" style="font-family: 'Cinzel', serif; color: var(--ouro); font-size: 1.2rem;">AGUARDANDO LEITURA DO PRODUTO...</p>
    </div>
</div>

<div id="resultado">
    <div class="selo-circular">
        <h2 style="font-family: 'Cinzel'; color: var(--ouro); margin-bottom: 20px; letter-spacing: 2px;">CERTIFICADO ORIGINAL</h2>
        <div id="detalhes-texto" style="text-align: left; line-height: 2; font-size: 0.9rem; border-top: 1px solid rgba(197,160,89,0.3); padding-top: 15px;"></div>
        <button class="btn-voltar" onclick="location.href=location.pathname">VOLTAR</button>
    </div>
</div>

<script>
    const MAT_PADRAO    = "ERVAS SAGRADAS DA UMBANDA";
    const ORIGEM_PADRAO = "Flecheiro";
    const LOTE_FIXO     = "26002";

    const BANCO_DADOS = {
        "FLCBCHFR226": { item: "BANHO CHAMA FREGUÊS" },
        "FLCBSPDB226": { item: "BANHO SETE PODERES DA BAHIA" },
        "FLCABRE226":  { item: "BANHO ABRE CAMINHO" },
        "FLCBCHD226":  { item: "BANHO CHAMA DINHEIRO" },
        "FLCBLCP226":  { item: "BANHO LIMPA CORPO" },
        "FLCBDDSJ26":  { item: "BANHO DESCARGA DE SÃO JORGE" },
        "FLCDSPT226":  { item: "BANHO DESEMPATA" },
        "FLCBANH2":    { item: "BANHO DE CHAMA" },
        "FLCOGUM2":    { item: "BANHO OGUM" },
        "FLCRETI2":    { item: "BANHO RETIRA TUDO" },
        "FLCSANT2":    { item: "BANHO SANTA BARBARA" },
        "FLCCOMI2":    { item: "BAMHO COMIGO NINGUÉM PODE" },
        "FLCFIRM2":    { item: "BANHO FIRMA CORRENTE" },
        "FLCSAID2":    { item: "BANHO SAI DE MIM" },
        "FLCCHEG2":    { item: "BANHO CHEGA TE A MIM" },
        "FLCDESA2":    { item: "BANHO DESATRAPALHA" },
        "FLCCOSM2":    { item: "BANHO COSME E DAMIÃO" },
        "FLCSETE2":    { item: "BANHO SETE FORÇA ESPIRITUAL" },
        "FLCFECH2":    { item: "BANHO FECHA CORPO" },
        "FLCAFAS2":    { item: "BANHO AFASTA ESPÍRITO MAL" },
        "FLCFORC2":    { item: "BANHO FORÇA LUZ E PODER" },
        "FLCDESA2_B":  { item: "BANHO DESATA NÓ" },
        "FLCARRE2":    { item: "BANHO ARRETIRANTE" },
        "FLCQUEB2":    { item: "BANHO QUEBRA DEMANDA" },
        "FLCCHAM2":    { item: "BANHO CHAMA CABOCLO" },
        "FLCABUS2":    { item: "BANHO ABUSO" },
        "FLCCORR2":    { item: "BANHO CORRE ATRÁS DE MIM" },
        "FLC7LIN2":    { item: "BANHO 7 LINHAS" },
        "FLCSODE2":    { item: "BANHO SÓ DEUS PODE COMIGO" },
        "FLCABRA2":    { item: "BANHO ABRANDA" },
        "FLCQUEB2_B":  { item: "BANHO QUEBRA MACUMBA" },
        "FLC7ERV2":    { item: "BANHO 7 ERVAS" },
        "FLCCHOR2":    { item: "BANHO CHORA NOS MEUS PÉS" },
        "FLCSAOS2":    { item: "BANHO SÃO SEBASTIÃO" },
        "FLCUIRA2":    { item: "BANHO UIRAPURU" },
        "FLCQUEB2_C":  { item: "BANHO QUEBRA AZAR" },
        "FLCFIRM2_B":  { item: "BANHO FIRMEZA" },
        "FLCPOMB2":    { item: "BANHO POMBA GIRA" },
        "FLCLIBE2":    { item: "BANHO LIBERTAÇÃO" },
        "FLCCASA2":    { item: "BANHO CASA CHEIA" },
        "FLCQUEB2_D":  { item: "BANHO QUEBRA FEITIÇO" },
        "FLC7FLE2":    { item: "BANHO 7 FLECHAS" },
        "FLCARRE2_B":  { item: "BANHO ARREIA CORRENTE" },
        "FLCAFAS2_B":  { item: "BANHO AFASTA MEUS INIMIGOS" },
        "FLCPROT2":    { item: "BANHO PROTEÇÃO" },
        "FLCAMAN2":    { item: "BANHO AMANSA TOURO" },
        "FLCSOMB2":    { item: "BANHO SOMBRA DO MUNDO" },
        "FLCCHAM2_B":  { item: "BANHO CHAMA DO AMOR" },
        "FLCQUEB2_E":  { item: "BANHO QUEBRA BARREIRA" },
        "FLCVAIB2":    { item: "BANHO VAI BUSCAR LONGE" },
        "FLCSETE2_B":  { item: "BANHO SETE MISTÉRIOS DA BAHIA" },
        "FLCVIRA2":    { item: "BANHO VIRA PENSAMENTO" },
        "FLCFAZQ2":    { item: "BANHO FAZ QUERER QUEM NÃO QUER" },
        "FLCIEMA2":    { item: "BANHO IEMANJÁ" },
        "FLCZEPE2":    { item: "BANHO ZÉ PELINTRA" },
        "FLCVENC2":    { item: "BANHO VENCE DEMANDA" },
        "FLCTIRA2":    { item: "BANHO TIRA PESO" },
        "FLC7ENC2":    { item: "BANHO 7 ENCRUZILHADAS" },
        "FLCDESM2":    { item: "BANHO DESMANCHA FEITIÇO" },
        "FLCOXAL2":    { item: "BANHO OXALÁ" },
        "FLCMARI2":    { item: "BANHO MARIA PADILHA" },
        "FLCDEST2":    { item: "BANHO DESTRANCA TUDO" },
        "FLCVENC2_B":  { item: "BANHO VENCE TUDO" },
        "FLCANJO2":    { item: "BANHO ANJO DA GUARDA" }
    };

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id) {
            const code = id.toUpperCase().trim();
            document.getElementById('loader').style.display = "block";
            document.getElementById('status-text').innerText = "ANALISANDO PRODUTO...";

            setTimeout(() => {
                const produto = BANCO_DADOS[code];
                document.getElementById('loader').style.display = "none";

                if (produto) {
                    document.getElementById('detalhes-texto').innerHTML = `
                        <p><strong>PRODUTO:</strong> ${produto.item}</p>
                        <p><strong>MATÉRIA-PRIMA:</strong> ${MAT_PADRAO}</p>
                        <p><strong>LOTE:</strong> ${LOTE_FIXO}</p>
                        <p><strong>ORIGEM:</strong> ${ORIGEM_PADRAO}</p>
                        <p><strong>SÉRIE:</strong> ${code}</p>
                    `;
                    document.getElementById('resultado').style.display = 'flex';
                } else {
                    document.getElementById('status-text').innerText = "CÓDIGO INVÁLIDO";
                    document.getElementById('status-text').style.color = "#ff4444";
                }
            }, 1500);
        }
    };
</script>

</body>
</html>
