<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Flecheiro | Autenticidade e Pureza</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ouro: #c5a059;
            --ouro-gradiente: linear-gradient(135deg, #8a6d3b 0%, #e1c27d 50%, #8a6d3b 100%);
            --verde-profundo: #04120b;
            --verde-selo: #0a2b1a;
            --branco-creme: #f4f1ea;
        }

        body {
            background-color: var(--verde-profundo);
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: var(--branco-creme);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .main-wrapper { width: 100%; max-width: 900px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }

        header { text-align: center; margin-bottom: 60px; }
        
        .img-topo {
            width: 180px;              /* Tamanho bom para destaque sem exagerar */
            max-height: 240px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 14px rgba(197, 160, 89, 0.7));
            object-fit: contain;       /* Mostra a imagem completa, sem cortes */
            border-radius: 10px;
        }

        header h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 4rem); color: var(--ouro); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 5px; }
        header p { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 4px; color: var(--ouro); opacity: 0.8; }

        .card-validacao {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 50px 20px;
            border-radius: 4px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .loader {
            width: 40px; height: 40px;
            border: 2px solid rgba(197, 160, 89, 0.2);
            border-top: 2px solid var(--ouro);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .manifesto { margin-top: 60px; padding: 30px; border-left: 2px solid var(--ouro); background: rgba(197,160,89,0.03); text-align: justify; }
        .manifesto h3 { font-family: 'Cinzel', serif; color: var(--ouro); margin-bottom: 15px; text-align: center; }
        .manifesto p { line-height: 1.6; margin-bottom: 15px; font-size: 0.95rem; }

        #resultado {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .selo-circular {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: var(--verde-selo);
            border-radius: 50%;
            border: 10px double var(--ouro);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            animation: zoomIn 0.5s ease-out;
        }

        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .selo-titulo { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--ouro); margin-bottom: 15px; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 10px; width: 80%; }

        .info-balao { color: #fff; font-size: 0.85rem; line-height: 1.5; width: 90%; text-align: left; }
        .info-balao p { margin-bottom: 10px; }
        .info-balao strong { color: var(--ouro); text-transform: uppercase; font-size: 0.7rem; display: block; letter-spacing: 1px; }

        .btn-voltar {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--ouro);
            color: var(--ouro);
            padding: 10px 25px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
        }

        footer {
            margin-top: auto;
            padding: 30px 20px 20px;
            font-size: 0.75rem;
            opacity: 0.65;
            text-align: center;
            display: flex
